# Baked into the image; activate with SPRING_PROFILES_ACTIVE=prod (Dockerfile default).
# Cluster-specific values come from the operator via Pod env (DB URL, credentials, port).
spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    root: ${APP_LOG_LEVEL:INFO}
