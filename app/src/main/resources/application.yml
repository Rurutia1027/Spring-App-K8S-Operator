spring:
  application:
    name: notes-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/notesdb}
    username: ${SPRING_DATASOURCE_USERNAME:notes}
    password: ${SPRING_DATASOURCE_PASSWORD:notes}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    root: ${APP_LOG_LEVEL:INFO}
