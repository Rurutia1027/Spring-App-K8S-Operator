apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: demo
spec:
  selector:
    app: postgres
  ports:
  - port: 5432
    targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:16-alpine
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_DB
          value: notesdb
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: notes-db-secret
              key: username
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: notes-db-secret
              key: password
        readinessProbe:
          exec:
            command: ["pg_isready", "-U", "notes", "-d", "notesdb"]
          initialDelaySeconds: 5
          periodSeconds: 5
